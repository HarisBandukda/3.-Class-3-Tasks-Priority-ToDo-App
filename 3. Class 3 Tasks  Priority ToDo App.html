<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Priority To-Do List</title>
<style>
  :root{
    --bg:#f4f6fb;
    --card:#ffffff;
    --text:#1c2230;
    --muted:#6b7280;
    --border:#e6e9f0;
    --accent:#4f6ef7;
    --accent-light:#eef1ff;
    --high:#ef4444;
    --high-bg:#fde8e8;
    --med:#f59e0b;
    --med-bg:#fff4e0;
    --low:#10b981;
    --low-bg:#e3f9ee;
    --shadow:0 6px 20px rgba(20,25,50,0.06);
    --radius:14px;
  }
  [data-theme="dark"]{
    --bg:#11131a;
    --card:#1b1e29;
    --text:#eef0f6;
    --muted:#9aa0b4;
    --border:#2a2e3c;
    --accent:#7c93ff;
    --accent-light:#23274a;
    --high-bg:#3a1f23;
    --med-bg:#3a2f1a;
    --low-bg:#1c3329;
    --shadow:0 6px 20px rgba(0,0,0,0.4);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    transition:background .25s,color .25s;
    min-height:100vh;
    padding:24px 16px 60px;
  }
  .wrap{max-width:760px;margin:0 auto;}

  header.top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:22px;
    gap:12px;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .logo{
    width:42px;height:42px;border-radius:12px;
    background:linear-gradient(135deg,#6e8cff,#4f6ef7);
    display:flex;align-items:center;justify-content:center;
    font-size:20px;color:white;box-shadow:var(--shadow);
  }
  .brand h1{font-size:22px;margin:0;letter-spacing:-0.3px;}
  .brand p{margin:0;font-size:12.5px;color:var(--muted);}

  .icon-btn{
    width:40px;height:40px;border-radius:10px;border:1px solid var(--border);
    background:var(--card);cursor:pointer;font-size:17px;
    display:flex;align-items:center;justify-content:center;
    transition:transform .15s, background .2s; color:var(--text);
  }
  .icon-btn:hover{transform:translateY(-2px);}

  /* stats */
  .stats{
    display:grid;grid-template-columns:repeat(4,1fr);
    gap:10px;margin-bottom:18px;
  }
  .stat{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:12px 10px;text-align:center;box-shadow:var(--shadow);
  }
  .stat .num{font-size:20px;font-weight:700;}
  .stat .lbl{font-size:11px;color:var(--muted);margin-top:2px;}

  .progress-card{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:14px 16px;margin-bottom:18px;box-shadow:var(--shadow);
  }
  .progress-card .row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px;color:var(--muted);}
  .progress-bar{height:9px;border-radius:6px;background:var(--border);overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,#6e8cff,#4f6ef7);width:0%;transition:width .4s ease;}

  /* add form */
  .add-card{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:16px;box-shadow:var(--shadow);margin-bottom:18px;
  }
  .add-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
  input[type="text"], input[type="date"], select{
    border:1px solid var(--border);background:var(--bg);color:var(--text);
    border-radius:10px;padding:10px 12px;font-size:14px;outline:none;
    transition:border-color .15s;
  }
  input[type="text"]{flex:1;min-width:160px;}
  input:focus, select:focus{border-color:var(--accent);}
  select{cursor:pointer;}
  .add-btn{
    background:var(--accent);color:white;border:none;border-radius:10px;
    padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer;
    transition:opacity .15s, transform .1s;
  }
  .add-btn:hover{opacity:.92;}
  .add-btn:active{transform:scale(.97);}

  .pill-group{display:flex;gap:6px;flex-wrap:wrap;}
  .pill{
    border:1px solid var(--border);background:var(--bg);color:var(--muted);
    border-radius:999px;padding:6px 13px;font-size:12.5px;cursor:pointer;
    transition:.15s;user-select:none;
  }
  .pill.active{background:var(--accent);color:white;border-color:var(--accent);}

  /* toolbar */
  .toolbar{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:10px;flex-wrap:wrap;gap:8px;
  }
  .search-box{
    display:flex;align-items:center;gap:6px;background:var(--card);
    border:1px solid var(--border);border-radius:10px;padding:6px 10px;flex:1;min-width:140px;
  }
  .search-box input{border:none;background:transparent;flex:1;padding:4px;}
  .filters{display:flex;gap:6px;flex-wrap:wrap;}

  /* list */
  #list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:10px;}
  .task{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:14px 14px;display:flex;align-items:flex-start;gap:12px;
    box-shadow:var(--shadow);animation:pop .25s ease;
    transition:transform .15s, opacity .2s;
  }
  .task.removing{opacity:0;transform:scale(.92);}
  @keyframes pop{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  .checkbox{
    width:22px;height:22px;border-radius:7px;border:2px solid var(--border);
    flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:.15s;
  }
  .checkbox.checked{background:var(--accent);border-color:var(--accent);color:white;font-size:13px;}

  .task-body{flex:1;min-width:0;}
  .task-title{font-size:14.5px;font-weight:600;word-break:break-word;}
  .task.completed .task-title{text-decoration:line-through;color:var(--muted);font-weight:500;}
  .task-meta{display:flex;gap:8px;align-items:center;margin-top:6px;flex-wrap:wrap;}

  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.3px;}
  .badge.high{background:var(--high-bg);color:var(--high);}
  .badge.medium{background:var(--med-bg);color:var(--med);}
  .badge.low{background:var(--low-bg);color:var(--low);}

  .due{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px;}
  .due.overdue{color:var(--high);font-weight:600;}
  .due.today{color:var(--med);font-weight:600;}

  .task-actions{display:flex;gap:6px;flex-shrink:0;}
  .task-actions button{
    border:none;background:transparent;cursor:pointer;font-size:15px;color:var(--muted);
    width:30px;height:30px;border-radius:8px;transition:.15s;
  }
  .task-actions button:hover{background:var(--accent-light);color:var(--accent);}

  .edit-input{
    width:100%;border:1px solid var(--accent);border-radius:8px;padding:6px 8px;font-size:14px;
    background:var(--bg);color:var(--text);
  }

  .empty{
    text-align:center;padding:50px 20px;color:var(--muted);
  }
  .empty .emoji{font-size:42px;margin-bottom:10px;}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--text);color:var(--bg);padding:11px 18px;border-radius:10px;
    font-size:13.5px;opacity:0;pointer-events:none;transition:.25s;
    display:flex;gap:14px;align-items:center;box-shadow:var(--shadow);z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}
  .toast button{background:none;border:none;color:var(--accent);font-weight:700;cursor:pointer;font-size:13px;}

  footer{text-align:center;margin-top:30px;font-size:11.5px;color:var(--muted);}

  @media (max-width:480px){
    .stats{grid-template-columns:repeat(2,1fr);}
    .add-row{flex-direction:column;}
    input[type="text"]{min-width:0;}
  }
</style>
</head>
<body data-theme="light">
<div class="wrap">

  <header class="top">
    <div class="brand">
      <div class="logo">✓</div>
      <div>
        <h1>TaskFlow</h1>
        <p>Priority-based to-do list</p>
      </div>
    </div>
    <button class="icon-btn" id="themeToggle" title="Toggle dark mode">🌙</button>
  </header>

  <div class="stats">
    <div class="stat"><div class="num" id="statTotal">0</div><div class="lbl">Total</div></div>
    <div class="stat"><div class="num" id="statActive">0</div><div class="lbl">Active</div></div>
    <div class="stat"><div class="num" id="statDone">0</div><div class="lbl">Done</div></div>
    <div class="stat"><div class="num" id="statOverdue">0</div><div class="lbl">Overdue</div></div>
  </div>

  <div class="progress-card">
    <div class="row"><span>Overall progress</span><span id="progressText">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="add-card">
    <div class="add-row">
      <input type="text" id="taskInput" placeholder="What do you need to do?" maxlength="120">
      <input type="date" id="dueInput">
      <select id="priorityInput">
        <option value="high">High</option>
        <option value="medium" selected>Medium</option>
        <option value="low">Low</option>
      </select>
      <button class="add-btn" id="addBtn">Add Task</button>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <span>🔎</span>
      <input type="text" id="searchInput" placeholder="Search tasks...">
    </div>
    <div class="filters" id="statusFilters">
      <span class="pill active" data-status="all">All</span>
      <span class="pill" data-status="active">Active</span>
      <span class="pill" data-status="completed">Completed</span>
    </div>
  </div>
  <div class="toolbar">
    <div class="filters" id="priorityFilters">
      <span class="pill active" data-priority="all">All priorities</span>
      <span class="pill" data-priority="high">High</span>
      <span class="pill" data-priority="medium">Medium</span>
      <span class="pill" data-priority="low">Low</span>
    </div>
    <select id="sortSelect" style="font-size:12.5px;">
      <option value="smart">Sort: Smart (priority + due)</option>
      <option value="due">Sort: Due date</option>
      <option value="created">Sort: Recently added</option>
      <option value="alpha">Sort: A–Z</option>
    </select>
  </div>

  <ul id="list"></ul>
  <div class="empty" id="emptyState" style="display:none;">
    <div class="emoji">🗂️</div>
    <div>No tasks here. Add one above to get started.</div>
  </div>

  <footer>Built with AI-assisted iterative development • Data saved locally in your browser</footer>
</div>

<div class="toast" id="toast">
  <span id="toastMsg"></span>
  <button id="toastUndo">UNDO</button>
</div>

<script>
(function(){
  const STORAGE_KEY = "taskflow_tasks_v1";
  const THEME_KEY = "taskflow_theme";

  let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  let statusFilter = "all";
  let priorityFilter = "all";
  let sortMode = "smart";
  let searchTerm = "";
  let lastDeleted = null;
  let toastTimer = null;

  const listEl = document.getElementById("list");
  const emptyEl = document.getElementById("emptyState");
  const taskInput = document.getElementById("taskInput");
  const dueInput = document.getElementById("dueInput");
  const priorityInput = document.getElementById("priorityInput");
  const addBtn = document.getElementById("addBtn");
  const searchInput = document.getElementById("searchInput");
  const sortSelect = document.getElementById("sortSelect");
  const themeToggle = document.getElementById("themeToggle");

  function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }
  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  function priorityRank(p){ return p === "high" ? 0 : p === "medium" ? 1 : 2; }

  function dayDiff(dateStr){
    if(!dateStr) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    const due = new Date(dateStr + "T00:00:00");
    return Math.round((due - today) / 86400000);
  }

  function formatDue(dateStr){
    const diff = dayDiff(dateStr);
    if(diff === null) return {text:"No due date", cls:""};
    if(diff < 0) return {text:`Overdue ${Math.abs(diff)}d`, cls:"overdue"};
    if(diff === 0) return {text:"Due today", cls:"today"};
    if(diff === 1) return {text:"Due tomorrow", cls:""};
    return {text:"Due " + new Date(dateStr+"T00:00:00").toLocaleDateString(undefined,{month:"short",day:"numeric"}), cls:""};
  }

  function addTask(){
    const text = taskInput.value.trim();
    if(!text){ taskInput.focus(); return; }
    tasks.push({
      id: uid(),
      text,
      priority: priorityInput.value,
      due: dueInput.value || null,
      completed: false,
      createdAt: Date.now()
    });
    taskInput.value = "";
    dueInput.value = "";
    save();
    render();
    taskInput.focus();
  }

  function toggleComplete(id){
    const t = tasks.find(t => t.id === id);
    if(t){ t.completed = !t.completed; save(); render(); }
  }

  function deleteTask(id){
    const idx = tasks.findIndex(t => t.id === id);
    if(idx === -1) return;
    lastDeleted = { task: tasks[idx], index: idx };
    tasks.splice(idx, 1);
    save();
    render();
    showToast("Task deleted", true);
  }

  function undoDelete(){
    if(!lastDeleted) return;
    tasks.splice(lastDeleted.index, 0, lastDeleted.task);
    lastDeleted = null;
    save();
    render();
    hideToast();
  }

  function showToast(msg, withUndo){
    const toast = document.getElementById("toast");
    document.getElementById("toastMsg").textContent = msg;
    document.getElementById("toastUndo").style.display = withUndo ? "inline" : "none";
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(hideToast, 4000);
  }
  function hideToast(){
    document.getElementById("toast").classList.remove("show");
  }

  function startEdit(id){
    const li = document.querySelector(`[data-id="${id}"] .task-title`);
    if(!li) return;
    const t = tasks.find(t => t.id === id);
    const input = document.createElement("input");
    input.type = "text";
    input.className = "edit-input";
    input.value = t.text;
    li.replaceWith(input);
    input.focus();
    input.select();
    function commit(){
      const val = input.value.trim();
      if(val) t.text = val;
      save();
      render();
    }
    input.addEventListener("blur", commit);
    input.addEventListener("keydown", e => {
      if(e.key === "Enter") commit();
      if(e.key === "Escape") render();
    });
  }

  function getFiltered(){
    let result = tasks.filter(t => {
      if(statusFilter === "active" && t.completed) return false;
      if(statusFilter === "completed" && !t.completed) return false;
      if(priorityFilter !== "all" && t.priority !== priorityFilter) return false;
      if(searchTerm && !t.text.toLowerCase().includes(searchTerm.toLowerCase())) return false;
      return true;
    });

    result.sort((a,b) => {
      if(a.completed !== b.completed) return a.completed ? 1 : -1;
      if(sortMode === "smart"){
        const pr = priorityRank(a.priority) - priorityRank(b.priority);
        if(pr !== 0) return pr;
        const da = a.due ? new Date(a.due) : new Date(8640000000000000);
        const db = b.due ? new Date(b.due) : new Date(8640000000000000);
        return da - db;
      }
      if(sortMode === "due"){
        const da = a.due ? new Date(a.due) : new Date(8640000000000000);
        const db = b.due ? new Date(b.due) : new Date(8640000000000000);
        return da - db;
      }
      if(sortMode === "alpha") return a.text.localeCompare(b.text);
      if(sortMode === "created") return b.createdAt - a.createdAt;
      return 0;
    });

    return result;
  }

  function render(){
    const filtered = getFiltered();
    listEl.innerHTML = "";
    emptyEl.style.display = filtered.length ? "none" : "block";

    filtered.forEach(t => {
      const li = document.createElement("li");
      li.className = "task" + (t.completed ? " completed" : "");
      li.setAttribute("data-id", t.id);

      const dueInfo = formatDue(t.due);

      li.innerHTML = `
        <div class="checkbox ${t.completed ? "checked" : ""}" data-action="toggle">${t.completed ? "✓" : ""}</div>
        <div class="task-body">
          <div class="task-title">${escapeHtml(t.text)}</div>
          <div class="task-meta">
            <span class="badge ${t.priority}">${t.priority}</span>
            <span class="due ${dueInfo.cls}">📅 ${dueInfo.text}</span>
          </div>
        </div>
        <div class="task-actions">
          <button data-action="edit" title="Edit">✏️</button>
          <button data-action="delete" title="Delete">🗑️</button>
        </div>
      `;
      listEl.appendChild(li);
    });

    updateStats();
  }

  function escapeHtml(str){
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function updateStats(){
    const total = tasks.length;
    const done = tasks.filter(t => t.completed).length;
    const active = total - done;
    const overdue = tasks.filter(t => !t.completed && t.due && dayDiff(t.due) < 0).length;

    document.getElementById("statTotal").textContent = total;
    document.getElementById("statActive").textContent = active;
    document.getElementById("statDone").textContent = done;
    document.getElementById("statOverdue").textContent = overdue;

    const pct = total ? Math.round((done/total)*100) : 0;
    document.getElementById("progressFill").style.width = pct + "%";
    document.getElementById("progressText").textContent = pct + "%";
  }

  // event delegation for list actions
  listEl.addEventListener("click", e => {
    const li = e.target.closest(".task");
    if(!li) return;
    const id = li.getAttribute("data-id");
    const action = e.target.closest("[data-action]")?.getAttribute("data-action");
    if(action === "toggle") toggleComplete(id);
    if(action === "edit") startEdit(id);
    if(action === "delete"){
      li.classList.add("removing");
      setTimeout(() => deleteTask(id), 180);
    }
  });

  addBtn.addEventListener("click", addTask);
  taskInput.addEventListener("keydown", e => { if(e.key === "Enter") addTask(); });

  document.getElementById("statusFilters").addEventListener("click", e => {
    const pill = e.target.closest(".pill");
    if(!pill) return;
    document.querySelectorAll("#statusFilters .pill").forEach(p => p.classList.remove("active"));
    pill.classList.add("active");
    statusFilter = pill.getAttribute("data-status");
    render();
  });

  document.getElementById("priorityFilters").addEventListener("click", e => {
    const pill = e.target.closest(".pill");
    if(!pill) return;
    document.querySelectorAll("#priorityFilters .pill").forEach(p => p.classList.remove("active"));
    pill.classList.add("active");
    priorityFilter = pill.getAttribute("data-priority");
    render();
  });

  sortSelect.addEventListener("change", e => { sortMode = e.target.value; render(); });

  searchInput.addEventListener("input", e => { searchTerm = e.target.value; render(); });

  document.getElementById("toastUndo").addEventListener("click", undoDelete);

  themeToggle.addEventListener("click", () => {
    const body = document.body;
    const newTheme = body.getAttribute("data-theme") === "dark" ? "light" : "dark";
    body.setAttribute("data-theme", newTheme);
    themeToggle.textContent = newTheme === "dark" ? "☀️" : "🌙";
    localStorage.setItem(THEME_KEY, newTheme);
  });

  // init theme
  const savedTheme = localStorage.getItem(THEME_KEY) || "light";
  document.body.setAttribute("data-theme", savedTheme);
  themeToggle.textContent = savedTheme === "dark" ? "☀️" : "🌙";

  // seed example tasks on first run
  if(tasks.length === 0){
    tasks = [
      { id: uid(), text: "Finish Lecture 3 assignment report", priority: "high", due: new Date().toISOString().slice(0,10), completed: false, createdAt: Date.now()-3000 },
      { id: uid(), text: "Review Agentic AI session notes", priority: "medium", due: null, completed: false, createdAt: Date.now()-2000 },
      { id: uid(), text: "Plan academy admission form fields", priority: "low", due: null, completed: true, createdAt: Date.now()-1000 },
    ];
    save();
  }

  render();
})();
</script>
</body>
</html>
